<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TASKFLOW | Login</title>
    <link rel="stylesheet" href="assets/css/app.css" />
    <link rel="stylesheet" href="assets/css/login.css" />
  </head>
  <body class="login-page">
    <div class="login-shell">
      <section class="login-hero">
        <div class="login-hero-inner">
          <div class="brand login-hero-brand">
            <div class="brand-mark">TF</div>
            <div class="brand-copy">
              <h1>TASKFLOW</h1>
              <p>Smart project management for small teams</p>
            </div>
          </div>
        </div>
      </section>

      <section class="login-card">
        <div>
          <h2>Welcome back</h2>
          <p>Sign in to continue into your TASKFLOW workspace.</p>
        </div>

        <form id="login-form" class="grid" autocomplete="off">
          <div class="form-group">
            <label for="identifier">Email</label>
            <input id="identifier" name="identifier" type="email" placeholder="Enter your email" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="password-field">
              <input id="password" name="password" type="password" placeholder="Enter password" required />
              <button
                class="password-toggle"
                id="password-toggle"
                type="button"
                aria-label="Show password"
                aria-pressed="false"
              >
                <span class="password-toggle-icon password-toggle-icon-eye" aria-hidden="true" hidden>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </span>
                <span class="password-toggle-icon password-toggle-icon-eye-off" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 3l18 18"></path>
                    <path d="M10.6 10.7a3 3 0 0 0 4.2 4.2"></path>
                    <path d="M9.9 5.1A10.4 10.4 0 0 1 12 5c6.4 0 10 7 10 7a17.7 17.7 0 0 1-4.2 4.8"></path>
                    <path d="M6.6 6.7A17.4 17.4 0 0 0 2 12s3.6 7 10 7a9.7 9.7 0 0 0 5-1.3"></path>
                  </svg>
                </span>
              </button>
            </div>
          </div>
          <div class="login-feedback" id="login-feedback" aria-live="polite" hidden>
            <div class="login-feedback-icon">!</div>
            <div class="login-feedback-copy">
              <strong id="login-feedback-title">Login failed</strong>
              <p id="login-error"></p>
            </div>
          </div>
          <button class="btn btn-primary btn-block" type="submit">Login to Dashboard</button>
        </form>
      </section>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="assets/js/core/utils.js?v=20260515f"></script>
    <script src="assets/js/core/events.js?v=20260515f"></script>
    <script src="assets/js/core/storage.js?v=20260515f"></script>
    <script src="assets/js/core/permissions.js?v=20260515f"></script>
    <script src="assets/js/data/seed.js?v=20260515f"></script>
    <script src="assets/js/core/auth.js?v=20260515f"></script>
    <script src="assets/js/core/ui.js?v=20260515f"></script>
    <script src="assets/js/pages/login-page.js?v=20260515f"></script>
  </body>
</html>
